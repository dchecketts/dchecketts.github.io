  <style>
    body, #mainCard, #generateBtn, #timeBadge, #excuseToggleContainer {
      transition: background-color 1.2s cubic-bezier(0.4, 0, 0.2, 1),

      border-color 1.2s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .star {
      animation: twinkle 3.5s infinite ease-in-out;
    }

    .city-haze {
      background: linear-gradient(to top, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
    }

    /* Smooth animation for newly generated posts */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>

  function drawProceduralCity(themeKey) {
    const container = document.getElementById('skylineBg');
    const theme = themes[themeKey];
    container.innerHTML = '';

    container.style.backgroundImage = theme.skyGradient;

    // Spawning vector stars if requested
    if (theme.hasStars) {
      const starsCount = 45;
      for (let i = 0; i < starsCount; i++) {
        const star = document.createElement('div');
        const randX = Math.random() * 100;
        const randY = Math.random() * 60;
        const size = Math.random() * 2 + 1;
        const delay = Math.random() * 3;
        star.className = 'star absolute rounded-full bg-white';
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${randX}%`;
        star.style.top = `${randY}%`;
        star.style.animationDelay = `${delay}s`;
        container.appendChild(star);
      }
    }

    // Spawning celestial sun or moon
    if (theme.sunMoon && theme.sunMoon.show) {
      const celestial = document.createElement('div');
      const conf = theme.sunMoon;
      let positionClass = '';

      if (conf.pos.includes('top-20')) positionClass = 'top-20 right-1/4';
      else if (conf.pos.includes('top-10')) positionClass = 'top-10 left-1/3';
      else if (conf.pos.includes('top-16')) positionClass = 'top-16 left-1/4';
      else if (conf.pos.includes('bottom-16')) positionClass = 'bottom-16 left-1/4';
      else if (conf.pos.includes('bottom-20')) positionClass = 'bottom-20 left-1/4';
      else positionClass = 'top-32 right-1/4';

      celestial.className = `absolute ${conf.size} rounded-full ${positionClass} ${conf.blur} transition-all duration-1000 z-0`;
      celestial.style.backgroundColor = conf.color;

      if (conf.type === 'moon') {
        celestial.className += ' shadow-[inset_-10px_-10px_0px_0px_rgba(255,255,255,0.9)]';
        celestial.style.backgroundColor = 'transparent';
      }
      container.appendChild(celestial);
    }

    // Building depths (Far, Mid, Near)
    const layers = [
      { id: 'far', count: 12, heightRange: [50, 85], color: theme.buildingFar, windowDensity: 0.1 },
      { id: 'mid', count: 14, heightRange: [30, 65], color: theme.buildingMid, windowDensity: 0.35 },
      { id: 'near', count: 16, heightRange: [15, 45], color: theme.buildingNear, windowDensity: 0.55 }
    ];

    layers.forEach((layer) => {
      const layerWrapper = document.createElement('div');
      layerWrapper.className = `absolute bottom-0 w-full flex items-end justify-between pointer-events-none`;

      if (layer.id === 'far') layerWrapper.className += ' z-2 opacity-50';
      if (layer.id === 'mid') layerWrapper.className += ' z-3 opacity-80';
      if (layer.id === 'near') layerWrapper.className += ' z-4';

      for (let i = 0; i < layer.count; i++) {
        const building = document.createElement('div');
        const randHeight = Math.floor(Math.random() * (layer.heightRange[1] - layer.heightRange[0])) + layer.heightRange[0];
        const randWidth = Math.floor(Math.random() * 5) + 6;

        building.style.height = `${randHeight}vh`;
        building.style.width = `${randWidth}%`;
        building.style.backgroundColor = layer.color;
        building.className = 'relative flex flex-col justify-start items-center p-1 rounded-t shadow-2xl transition-all duration-1000';

        const roofType = Math.random();
        if (roofType > 0.75) {
          const spire = document.createElement('div');
          const spireHeight = Math.floor(Math.random() * 25) + 15;
          spire.className = 'absolute bottom-full w-0.5';
          spire.style.height = `${spireHeight}px`;
          spire.style.backgroundColor = layer.color;
          building.appendChild(spire);
        } else if (roofType > 0.55 && roofType <= 0.75) {
          const angle = document.createElement('div');
          angle.className = 'absolute bottom-full w-full h-4 overflow-hidden';
          angle.style.borderBottom = `16px solid ${layer.color}`;
          angle.style.borderRight = '100px solid transparent';
          building.appendChild(angle);
        }

        if (layer.id !== 'far') {
          const windowGrid = document.createElement('div');
          windowGrid.className = 'grid grid-cols-3 gap-1.5 w-4/5 mt-4 opacity-90';

          const slots = Math.min(24, Math.floor(randHeight / 2.5));
          for (let w = 0; w < slots; w++) {
            const win = document.createElement('div');
            win.className = 'h-1.5 rounded-sm transition-all duration-1000';

            if (Math.random() < layer.windowDensity) {
              if (theme.windowColor === 'neon') {
                const neons = ['rgba(6, 182, 212, 0.85)', 'rgba(236, 72, 153, 0.85)', 'rgba(234, 179, 8, 0.85)', 'rgba(168, 85, 247, 0.85)'];
                win.style.backgroundColor = neons[Math.floor(Math.random() * neons.length)];
                win.className += ' shadow-[0_0_4px_rgba(236,72,153,0.3)]';
              } else {
                win.style.backgroundColor = theme.windowColor;
              }
            } else {
              win.style.backgroundColor = 'rgba(0,0,0,0.35)';
            }
            windowGrid.appendChild(win);
          }
          building.appendChild(windowGrid);
        }
        layerWrapper.appendChild(building);
      }
      container.appendChild(layerWrapper);
    });
  }

  function getCurrentTimePeriod() {
    const hours = new Date().getHours();
    if (hours >= 4 && hours < 6) return 'insanelyEarly';
    if (hours >= 6 && hours < 11) return 'morning';
    if (hours >= 11 && hours < 13) return 'noon';
    if (hours >= 13 && hours < 17) return 'afternoon';
    if (hours >= 17 && hours < 21) return 'evening';
    return 'night';
  }

  function applyDynamicStyling() {
    const currentPeriodKey = getCurrentTimePeriod();
    const timeData = timePools[currentPeriodKey];
    const theme = themes[timeData.theme];

    document.getElementById('mainCard').className = `w-full max-w-xl rounded-2xl shadow-2xl p-6 md:p-8 text-center border backdrop-blur-md z-10 ${theme.card}`;
    document.getElementById('timeBadge').className = `inline-block text-xs font-bold px-4 py-1.5 rounded-full border mt-3 shadow-md ${theme.badge}`;

  async function fetchDeveloperExcuse() {
    const statusIndicator = document.getElementById('apiStatus');
    statusIndicator.classList.remove('hidden');
    statusIndicator.classList.add('flex');

    try {
      // Using corsproxy.io wrapper to prevent standard CORS errors
      const response = await fetch("https://corsproxy.io/?url=https://api.devexcus.es/", {
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        throw new Error("API responded with an error");
      }

      const data = await response.json();

      // Expects text field from api.devexcus.es response schemas
      if (data && data.text) {
        return data.text;
      } else if (data && data.excuse) {
        return data.excuse;
      }
      throw new Error("No readable text payload");
    } catch (err) {
      console.warn("Failed fetching from DevExcuses API, running local baseline database fallback:", err);
      return fallbackDeveloperExcuses[Math.floor(Math.random() * fallbackDeveloperExcuses.length)];
    } finally {
      statusIndicator.classList.add('hidden');
      statusIndicator.classList.remove('flex');
    }
  }

  const generateBtn = document.getElementById('generateBtn');
  const copyBtn = document.getElementById('copyBtn');
  const outputContainer = document.getElementById('outputContainer');
  const outputText = document.getElementById('outputText');
  const excuseToggle = document.getElementById('excuseToggle');

  const randomItem = (arr) => arr[Math.floor(Math.random() * arr.length)];

  generateBtn.addEventListener('click', async () => {
    // Re-apply time styling on interaction
    applyDynamicStyling();

    const period = getCurrentTimePeriod();
    const pool = timePools[period];

    const hook = randomItem(pool.hooks);
    const conclusion = randomItem(conclusions);
    const hashtag = randomItem(hashtags);

    let achievementText = "";
    let metricText = "";

    if (excuseToggle.checked) {
      // Injecting developer excuse directly into achievement parameters
      const devExcuse = await fetchDeveloperExcuse();
      achievementText = `pivoted our entire focus because we discovered that "${devExcuse}"`;
      metricText = "resulting in a 412% spike in emergency Slack channels and retrospective action items";
    } else {
      // Standard satire arrays
      achievementText = randomItem(pool.achievements);
      metricText = randomItem(metrics);
    }

    // Synthesize the corporate masterpiece
    outputText.textContent = `${hook}\n\nI recently ${achievementText}, ${metricText}.\n\n${conclusion}\n\n${hashtag}`;
    outputContainer.classList.remove('hidden');
    copyBtn.textContent = 'Copy Post';
  });

  // Copy mechanism
  copyBtn.addEventListener('click', () => {
    const textToCopy = outputText.textContent;
    navigator.clipboard.writeText(textToCopy).then(() => {
      copyBtn.textContent = 'Copied! 📋';
      setTimeout(() => { copyBtn.textContent = 'Copy Post'; }, 2000);
    });
  });

  // --- 5. INITIALIZE ---
  applyDynamicStyling();
</script>
</body>
</html>
